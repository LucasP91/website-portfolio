<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Illustration of a magnifying glass finding a car listing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232831"/>
      <stop offset="1" stop-color="#15181e"/>
    </linearGradient>
  </defs>

  <!-- background (matches the card placeholder gradient) -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- listing rows (top-left): the "feed" being scanned -->
  <g>
    <circle cx="150" cy="142" r="10" fill="#7aa2ff"/>
    <rect x="180" y="130" width="300" height="24" rx="12" fill="#55627a"/>
    <circle cx="150" cy="202" r="10" fill="#3a4353"/>
    <rect x="180" y="190" width="210" height="24" rx="12" fill="#3a4353"/>
    <circle cx="150" cy="262" r="10" fill="#3a4353"/>
    <rect x="180" y="250" width="260" height="24" rx="12" fill="#3a4353"/>
  </g>

  <!-- dashed road -->
  <line x1="260" y1="806" x2="1340" y2="806" stroke="#2a313c" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="4 52"/>

  <!-- car (line-art, site blue) -->
  <g stroke="#7aa2ff" stroke-width="14" fill="none" stroke-linecap="round">
    <path d="M500 590 C550 470, 850 470, 910 590"/>
    <rect x="330" y="590" width="740" height="130" rx="60"/>
    <line x1="705" y1="600" x2="705" y2="712" stroke-width="8" opacity="0.5"/>
    <circle cx="545" cy="722" r="64" fill="#161b22"/>
    <circle cx="865" cy="722" r="64" fill="#161b22"/>
    <circle cx="545" cy="722" r="10" fill="#7aa2ff" stroke="none"/>
    <circle cx="865" cy="722" r="10" fill="#7aa2ff" stroke="none"/>
    <circle cx="1046" cy="632" r="10" fill="#93c5fd" stroke="none"/>
  </g>

  <!-- magnifying glass locking onto the listing -->
  <g>
    <circle cx="1120" cy="420" r="200" fill="rgb(147 197 253 / 0.07)"
            stroke="#ddd6fe" stroke-width="18"/>
    <line x1="1262" y1="562" x2="1398" y2="698" stroke="#ddd6fe"
          stroke-width="32" stroke-linecap="round"/>
    <!-- the find: a price chip in the lens -->
    <rect x="1000" y="378" width="240" height="84" rx="42"
          fill="rgb(122 162 255 / 0.16)" stroke="#7aa2ff" stroke-width="6"/>
    <text x="1120" y="438" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="52" font-weight="700" fill="#dbe7ff">$8,450</text>
  </g>
</svg>
